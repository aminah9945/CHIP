services:
  postgres:
    image: postgres:16-alpine
    container_name: chip-postgres
    environment:
      POSTGRES_DB: chip
      POSTGRES_USER: chip
      POSTGRES_PASSWORD: chip_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../migrations/V001__layer2_ingestion_schema.sql:/docker-entrypoint-initdb.d/V001__layer2_ingestion_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chip -d chip"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: chip-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: chip-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadminpassword;
      mc mb myminio/chip-bronze --ignore-existing;
      mc version enable myminio/chip-bronze;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
